<nav
  class="fixed top-0 left-0 w-full z-50 backdrop-blur-sm border-b"
  style="background-color: var(--nav-bg); border-color: var(--c-border);"
  aria-label="Main navigation"
>
  <div
    class="max-w-6xl mx-auto px-6 md:px-10 h-16 flex items-center justify-between"
  >
    <!-- Logo -->
    <a
      href="#home"
      (click)="scrollTo($event, 'home')"
      class="text-sm md:text-base font-bold tracking-wider hover:opacity-80 transition-opacity"
      style="color: var(--c-text);"
      aria-label="Home"
    >
      <span style="color: var(--c-muted);">&gt;</span> Lipun Kumar Patel
        <span class="cursor-seq cursor-seq--1">▮</span><span class="cursor-seq cursor-seq--2">▮</span><span class="cursor-seq cursor-seq--3">▮</span>
    </a>

    <div class="flex items-center gap-6">
      <!-- Desktop Nav -->
      <ul class="hidden md:flex items-center gap-8 text-sm tracking-wide">
        @for (link of navLinks; track link.id) {
          <li>
            <a
              [href]="'#' + link.id"
              (click)="scrollTo($event, link.id)"
              class="uppercase transition-colors duration-200"
              [style.color]="activeSection() === link.id ? 'var(--c-text)' : 'var(--c-muted)'"
            >
              {{ link.label }}
            </a>
          </li>
        }
      </ul>

      <!-- Theme Toggle -->
      <button
        (click)="themeService.toggle()"
        class="w-8 h-8 flex items-center justify-center border rounded transition-colors duration-200"
        style="border-color: var(--c-border); color: var(--c-muted);"
        [attr.aria-label]="themeService.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
      >
        @if (themeService.theme() === 'dark') {
          <!-- Sun icon -->
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
          </svg>
        } @else {
          <!-- Moon icon -->
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
          </svg>
        }
      </button>

      <!-- Mobile Hamburger -->
      <button
        class="md:hidden flex flex-col gap-[5px] p-2"
        (click)="toggleMenu()"
        [attr.aria-expanded]="menuOpen()"
        aria-controls="mobile-menu"
        aria-label="Toggle navigation menu"
      >
        <span
          class="w-5 h-[2px] transition-all duration-200 origin-center"
          style="background-color: var(--c-text);"
          [style.transform]="menuOpen() ? 'translateY(7px) rotate(45deg)' : 'none'"
        ></span>
        <span
          class="w-5 h-[2px] transition-all duration-200"
          style="background-color: var(--c-text);"
          [style.opacity]="menuOpen() ? '0' : '1'"
        ></span>
        <span
          class="w-5 h-[2px] transition-all duration-200 origin-center"
          style="background-color: var(--c-text);"
          [style.transform]="menuOpen() ? 'translateY(-7px) rotate(-45deg)' : 'none'"
        ></span>
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  @if (menuOpen()) {
    <div
      id="mobile-menu"
      class="md:hidden border-t"
      style="border-color: var(--c-border); background-color: var(--c-bg);"
    >
      <ul class="flex flex-col px-6 py-4 gap-4 text-sm tracking-wide">
        @for (link of navLinks; track link.id) {
          <li>
            <a
              [href]="'#' + link.id"
              (click)="scrollTo($event, link.id); closeMenu()"
              class="uppercase transition-colors duration-200 block py-1"
              [style.color]="activeSection() === link.id ? 'var(--c-text)' : 'var(--c-muted)'"
            >
              {{ link.label }}
            </a>
          </li>
        }
      </ul>
    </div>
  }
</nav>
