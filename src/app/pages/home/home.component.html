<section
  class="min-h-screen flex items-center pt-16"
  [@heroEntrance]
>
  <div
    class="max-w-6xl mx-auto px-6 md:px-10 w-full flex flex-col-reverse md:flex-row items-center gap-12 md:gap-16"
  >
    <!-- Left: Portrait Image -->
    <div class="animate-item w-full md:w-2/5 flex justify-center">
      <div class="relative mag-image">
        <img
          src="lipun_pixel.jpg"
          alt="Portrait of Lipun"
          class="w-64 h-64 md:w-80 md:h-80 object-cover grayscale contrast-125"
          style="
            filter: grayscale(1) contrast(1.3);
            image-rendering: auto;
          "
          loading="eager"
        />
        <!-- Halftone dot overlay -->
        <div
          class="absolute inset-0 opacity-30 mix-blend-multiply pointer-events-none"
          style="
            background-image: radial-gradient(circle, var(--c-text) 1px, transparent 1px);
            background-size: 4px 4px;
          "
        ></div>
      </div>
    </div>

    <!-- Right: Heading -->
    <div class="w-full md:w-3/5 text-center md:text-left">
      <h1 class="animate-item text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-bold leading-tight tracking-tight">
        @for (char of curiousChars; track $index) {
          <span class="mag-letter" [class.space]="char === ' '">{{ char === ' ' ? '\u00A0' : char }}</span>
        }
      </h1>
      <h1 class="animate-item text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-bold leading-tight tracking-tight whitespace-nowrap mt-2">
        @for (char of developerChars; track $index) {
          <span class="mag-letter" [class.space]="char === ' '">{{ char === ' ' ? '\u00A0' : char }}</span>
        }
      </h1>

      <p
        class="animate-item mt-8 text-base md:text-lg tracking-wider"
        style="color: var(--c-muted);"
      >
        <span style="color: var(--c-text);">&gt;</span> READY TO EXECUTE
        <span class="cursor-seq cursor-seq--1" style="color: var(--c-text);">▮</span><span class="cursor-seq cursor-seq--2" style="color: var(--c-text);">▮</span><span class="cursor-seq cursor-seq--3" style="color: var(--c-text);">▮</span>
      </p>
    </div>
  </div>
</section>
